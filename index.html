<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HM Store</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    /* ===== LAYAR PEMBUKA ===== */
    #splash {
      position: fixed;
      inset: 0;
      z-index: 10;
      background-image:
        linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.4)),
        url('https://i.imgur.com/j6Y9blP.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }

    #splash.hidden-splash {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    /* ===== IFRAME STORE ===== */
    #store-frame {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      z-index: 5;
      display: none;
      background: #fff;
    }

    #store-frame.visible {
      display: block;
    }

    /* ===== TOMBOL CEMBUNG ===== */
    .btn-cembung {
      background: #ffffff;
      box-shadow:
        0px 12px 24px rgba(0, 0, 0, 0.18),
        inset 0px -6px 12px rgba(0, 0, 0, 0.12),
        inset 0px 6px 12px rgba(255, 255, 255, 0.9);
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      cursor: pointer;
    }

    .btn-cembung:hover {
      transform: scale(1.05);
    }

    .btn-cembung:active {
      transform: scale(0.95);
      box-shadow:
        0px 4px 8px rgba(0, 0, 0, 0.12),
        inset 0px 4px 8px rgba(0, 0, 0, 0.18),
        inset 0px -4px 8px rgba(255, 255, 255, 0.5);
    }

    /* ===== ANIMASI MASUK ===== */
    .fade-in-center {
      animation: scaleUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes scaleUp {
      from { opacity: 0; transform: scale(0.9); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* ===== LOADING SPINNER ===== */
    #loading {
      position: fixed;
      inset: 0;
      z-index: 8;
      background: #fff;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }

    #loading.visible {
      display: flex;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 5px solid #e2e8f0;
      border-top-color: #1e3a5f;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body class="w-full h-screen overflow-hidden m-0 p-0 select-none">

  <!-- ① Layar Pembuka -->
  <div id="splash">
    <div class="fade-in-center px-6">
      <button
        onclick="bukaToko()"
        class="btn-cembung inline-flex items-center justify-center text-center rounded-full text-blue-950 font-extrabold tracking-wider
               w-64 py-4 text-lg md:w-80 md:py-5 md:text-xl">
        Mulai Belanja
      </button>
    </div>
  </div>

  <!-- ② Loading sementara iframe dimuat -->
  <div id="loading">
    <div class="spinner"></div>
    <p style="font-family:'Plus Jakarta Sans',sans-serif; color:#1e3a5f; font-weight:700; font-size:1rem;">
      Membuka toko…
    </p>
  </div>

  <!-- ③ Iframe — URL browser TIDAK berubah -->
  <iframe
    id="store-frame"
    src=""
    title="HM Store"
    allowfullscreen
  ></iframe>

  <script>
    const STORE_URL = "https://script.google.com/macros/s/AKfycbz7CtnVC3YomR5W7WqAIq5FIwLRfhiVXBkpWeNPcl_hOSFGx0K5aV_C1hnIhm0cV_llTA/exec";

    function bukaToko() {
      const splash  = document.getElementById('splash');
      const loading = document.getElementById('loading');
      const frame   = document.getElementById('store-frame');

      // Tampilkan loading, sembunyikan splash
      splash.classList.add('hidden-splash');
      loading.classList.add('visible');

      // Set src iframe → mulai muat halaman Google Apps Script
      frame.src = STORE_URL;

      // Begitu iframe selesai muat, sembunyikan loading dan tampilkan iframe
      frame.onload = function () {
        loading.classList.remove('visible');
        frame.classList.add('visible');
      };
    }
  </script>
</body>
</html>
